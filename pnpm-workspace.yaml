packages:
  - "packages/*"
  - "apps/*"
  - "clis/lepton"
  - "services/sidecars/*"
# apps/arc-prediction-markets -> @uma/core pulls a git-resolved `abi-decoder`
# transitive dep; allow exotic subdeps so the adopted app installs.
blockExoticSubdeps: false
allowBuilds:
  bufferutil: false
  esbuild: true
  sharp: true
  unrs-resolver: false
  utf-8-validate: false
